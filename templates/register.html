<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Chain – Create Account</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif;
         background: linear-gradient(135deg, #3e1f0d 0%, #8b5e3c 100%);
         min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 12px; padding: 2.5rem 2rem;
          width: 400px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
  .logo { text-align: center; font-size: 2.6rem; margin-bottom: .3rem; }
  h1 { text-align: center; font-size: 1.35rem; font-weight: 700; color: #3e1f0d; margin-bottom: .2rem; }
  .sub { text-align: center; font-size: .84rem; color: #7a6652; margin-bottom: 1.6rem; }
  label { display: block; font-size: .82rem; font-weight: 600; color: #7a6652; margin-bottom: .3rem; }
  input, select { width: 100%; border: 1px solid #ddd0c4; border-radius: 6px;
                  padding: .6rem .8rem; font-size: .93rem; margin-bottom: 1rem;
                  background: #fff; color: #2c1a0e; }
  input:focus, select:focus { outline: 2px solid #d4a762; outline-offset: 1px; border-color: transparent; }
  .help { font-size: .76rem; color: #9a8272; margin-top: -.7rem; margin-bottom: .9rem; }
  button { width: 100%; background: #5c3317; color: #fff; border: none;
           border-radius: 6px; padding: .72rem; font-size: 1rem; font-weight: 600;
           cursor: pointer; transition: background .15s; }
  button:hover { background: #7a4726; }
  .alert { border-radius: 5px; padding: .6rem .8rem; margin-bottom: 1rem; font-size: .88rem; }
  .alert.danger  { background: #f8d7da; color: #842029; }
  .alert.success { background: #d1e7dd; color: #0a3622; }
  .back { display: block; text-align: center; margin-top: 1.1rem;
          font-size: .88rem; color: #5c3317; font-weight: 600; text-decoration: none; }
  .back:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">☕</div>
  <h1>Create Account</h1>
  <p class="sub">Employee self-registration</p>

  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
      <div class="alert {{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <label for="employee_id">Link to Employee Profile</label>
    <select name="employee_id" id="employee_id">
      <option value="">— I'll link later / not an employee —</option>
      {% for e in employees %}
      <option value="{{ e.id }}">{{ e.name }} ({{ e.cafe }})</option>
      {% endfor %}
    </select>
    <p class="help">Select your name so orders are linked to your profile.</p>

    <label for="username">Username</label>
    <input id="username" name="username" type="text" required autocomplete="off">

    <label for="password">Password</label>
    <input id="password" name="password" type="password" required autocomplete="new-password">

    <label for="password2">Confirm Password</label>
    <input id="password2" name="password2" type="password" required autocomplete="new-password">

    <button type="submit">Create Account</button>
  </form>
  <a class="back" href="/">← Back to login</a>
</div>
</body>
</html>
