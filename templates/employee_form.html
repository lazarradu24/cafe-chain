{% extends "base.html" %}
{% block title %} – {{ 'Edit' if emp else 'Add' }} Employee{% endblock %}
{% block content %}
<h1>{{ 'Edit' if emp else 'Add' }} Employee</h1>
<div class="card" style="max-width:560px">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group full">
        <label>Full Name</label>
        <input name="name" type="text" value="{{ emp.name if emp else '' }}" required>
      </div>
      <div class="form-group">
        <label>Date of Birth</label>
        <input name="dob" type="date" value="{{ emp.date_of_birth if emp else '' }}" required>
      </div>
      <div class="form-group">
        <label>Position</label>
        <select name="position" required>
          {% for pos in ['Manager','Barista','Waiter','Chef','Cashier'] %}
          <option value="{{ pos }}" {{ 'selected' if emp and emp.position == pos }}>{{ pos }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Monthly Salary (€)</label>
        <input name="salary" type="number" step="0.01" min="0" value="{{ emp.salary if emp else '' }}" required>
      </div>
      <div class="form-group">
        <label>Assigned Café</label>
        <select name="cafe_id" required>
          {% for c in cafes %}
          <option value="{{ c.id }}" {{ 'selected' if emp and emp.cafe_id == c.id }}>{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div style="margin-top:1.2rem;display:flex;gap:.7rem">
      <button type="submit" class="btn btn-primary">{{ 'Save Changes' if emp else 'Add Employee' }}</button>
      <a href="{{ url_for('employees') }}" class="btn" style="background:#eee">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
