<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Chain – Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif;
         background: linear-gradient(135deg, #3e1f0d 0%, #8b5e3c 100%);
         min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; border-radius: 12px; padding: 2.5rem 2rem;
          width: 370px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
  .logo { text-align: center; font-size: 3rem; margin-bottom: .3rem; }
  h1 { text-align: center; font-size: 1.45rem; font-weight: 700; color: #3e1f0d; margin-bottom: .2rem; }
  .sub { text-align: center; font-size: .84rem; color: #7a6652; margin-bottom: 1.8rem; }
  label { display: block; font-size: .82rem; font-weight: 600; color: #7a6652; margin-bottom: .3rem; }
  input { width: 100%; border: 1px solid #ddd0c4; border-radius: 6px;
          padding: .6rem .8rem; font-size: .95rem; margin-bottom: 1rem; }
  input:focus { outline: 2px solid #d4a762; outline-offset: 1px; border-color: transparent; }
  button { width: 100%; background: #5c3317; color: #fff; border: none;
           border-radius: 6px; padding: .72rem; font-size: 1rem; font-weight: 600;
           cursor: pointer; transition: background .15s; }
  button:hover { background: #7a4726; }
  .alert { background: #f8d7da; color: #842029; border-radius: 5px;
           padding: .6rem .8rem; margin-bottom: 1rem; font-size: .88rem; }
  .divider { border: none; border-top: 1px solid #eee; margin: 1.3rem 0; }
  .register-link { text-align: center; font-size: .88rem; }
  .register-link a { color: #5c3317; font-weight: 600; text-decoration: none; }
  .register-link a:hover { text-decoration: underline; }
  .hint { text-align: center; font-size: .74rem; color: #bbb; margin-top: .9rem; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">☕</div>
  <h1>Café Chain</h1>
  <p class="sub">Management System</p>

  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}<div class="alert">{{ msg }}</div>{% endfor %}
  {% endwith %}

  <form method="POST">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" placeholder="Enter username" required autofocus>
    <label for="password">Password</label>
    <input id="password" name="password" type="password" placeholder="••••••••" required>
    <button type="submit">Sign In</button>
  </form>
  <p class="hint">Contact your manager if you need an account.</p>
</div>
</body>
</html>
